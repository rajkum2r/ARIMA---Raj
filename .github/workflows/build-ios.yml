name: Build Native iOS App (.ipa)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install

      - name: Sync Capacitor iOS
        run: |
          npx cap sync ios

      - name: Build Xcode iOS App Binary (.ipa)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r ARIA-MAX.ipa Payload
          mv ARIA-MAX.ipa ../../ARIA-MAX.ipa

      - name: Upload iOS .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-MAX-iOS-App-IPA
          path: ARIA-MAX.ipa
